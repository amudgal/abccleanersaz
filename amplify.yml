version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      buildSetting:
        environmentVariables:
          ADMIN_EMAIL: "${ADMIN_EMAIL}"
          ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
          JWT_SECRET: "${JWT_SECRET}"
          NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL}"
